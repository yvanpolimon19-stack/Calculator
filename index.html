<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div class="calculator">

        <div id="innerDisplay"> </div>
        <div class="row" id="display"></div>

        <div class="row">
            <button class= "button digit">7</button>
            <button class="digit button">8</button>
            <button class="digit button">9</button>
            <button class="operator button" style="width: 26.2%;">/</button>        
        </div>
        <div class="row">
            <button class="digit button">4</button>
            <button class="digit button">5</button>
            <button class="digit button">6</button>
            <button class="operator button" style="width: 26.2%;">*</button>        
        </div>
        <div class="row">
            <button class="digit button">1</button>
            <button class="digit button">2</button>
            <button class="digit button">3</button>
            <button class="operator button" style="width: 26.2%;">+</button>        
        </div>
        <div class="row">
            <button class="button">AC</button>
            <button class="digit button" >0</button>
            <button class="button decimal">.</button>
            <button class="operator button" style="width: 26.2%;">-</button>        
        </div>
        <div class="lastRow">
            <button id="equal" class="button" style="width: 24%;">=</button>
            <button class="button" style="width: 48.5%;">clear</button>
            <button class="backspace button" style="width: 26.1%;">Backspace</button>
        </div>
        <div class="row">

            

        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
